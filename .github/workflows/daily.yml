name: Daily Rankings Scrape

on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 AM UTC every day
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write       # Needed to commit & push data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run ranking scraper
        run: python scripts/scrape_rankings.py

      - name: Commit and push updated data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: rankings update $(date -u +%Y-%m-%d)" &&
            git push
          )

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_slack.py
